name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core

      - name: Terraform validate
        run: make tf-validate

      - name: Ansible syntax checks
        run: make ansible-lint

      - name: Validate shell scripts syntax
        run: |
          bash -n infra/scripts/setup-wireguard.sh
          bash -n infra/scripts/setup-coredns.sh
          bash -n infra/scripts/run-container.sh
          bash -n infra/scripts/validate-connectivity.sh

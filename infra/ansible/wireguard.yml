---
- name: Configure WireGuard server and generate client profiles
  hosts: wireguard_server
  become: true
  vars:
    client_hosts: "{{ groups['wireguard_clients'] | default([]) }}"
  tasks:
    - name: Load local pre-registered users file when present
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/group_vars/users.yml"
      failed_when: false

    - name: Ensure at least one pre-registered user is configured
      ansible.builtin.assert:
        that:
          - (pre_registered_users | default([]) | length) > 0
        fail_msg: "No pre-registered users found. Define users in infra/ansible/group_vars/users.yml and re-run make config."
        success_msg: "Pre-registered users are configured."

    - name: Install WireGuard packages
      ansible.builtin.apt:
        name:
          - wireguard
          - wireguard-tools
        state: present
        update_cache: true

    - name: Install required runtime and validation tools
      ansible.builtin.apt:
        name:
          - curl
          - dnsutils
          - iproute2
        state: present
        update_cache: true

    - name: Persist IPv4 forwarding setting
      ansible.builtin.lineinfile:
        path: /etc/sysctl.conf
        regexp: '^net.ipv4.ip_forward\s*='
        line: net.ipv4.ip_forward=1

    - name: Apply IPv4 forwarding setting
      ansible.builtin.command: sysctl -w net.ipv4.ip_forward=1
      changed_when: false

    - name: Ensure WireGuard directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode }}"
      loop:
        - { path: /etc/wireguard, mode: "0700" }
        - { path: /etc/wireguard/clients, mode: "0700" }
        - { path: /opt/netlab/wg-clients, mode: "0755" }

    - name: Ensure client auth directory exists
      ansible.builtin.file:
        path: /opt/netlab/auth
        state: directory
        mode: "0755"

    - name: Check whether server private key exists
      ansible.builtin.stat:
        path: /etc/wireguard/server_private.key
      register: server_private_key_stat

    - name: Validate existing server private key
      ansible.builtin.shell: set -euo pipefail; tr -d '\r\n[:space:]' < /etc/wireguard/server_private.key | wg pubkey >/dev/null
      args:
        executable: /bin/bash
      register: existing_server_key_validation
      changed_when: false
      failed_when: false
      when: server_private_key_stat.stat.exists

    - name: Generate new server private key when missing or invalid
      ansible.builtin.command: wg genkey
      register: generated_server_key
      changed_when: true
      when: not server_private_key_stat.stat.exists or existing_server_key_validation.rc != 0

    - name: Persist generated server private key
      ansible.builtin.copy:
        dest: /etc/wireguard/server_private.key
        content: "{{ generated_server_key.stdout | trim }}\n"
        mode: "0600"
      when: generated_server_key is defined and generated_server_key.stdout is defined and (generated_server_key.stdout | trim | length > 0)

    - name: Normalize server private key file format
      ansible.builtin.shell: |
        set -euo pipefail
        key="$(tr -d '\r\n[:space:]' < /etc/wireguard/server_private.key)"
        printf '%s\n' "${key}" > /etc/wireguard/server_private.key
        chmod 600 /etc/wireguard/server_private.key
      args:
        executable: /bin/bash
      changed_when: false

    - name: Read server private key
      ansible.builtin.slurp:
        path: /etc/wireguard/server_private.key
      register: server_private_key

    - name: Derive server public key
      ansible.builtin.shell: set -euo pipefail; tr -d '\r\n[:space:]' < /etc/wireguard/server_private.key | wg pubkey
      args:
        executable: /bin/bash
      register: server_public_key
      changed_when: false

    - name: Build client definitions
      ansible.builtin.set_fact:
        wireguard_clients_data: "{{ wireguard_clients_data | default([]) + [ {'name': item, 'ip': '10.0.0.' ~ (loop_index + 2) ~ '/32'} ] }}"
      loop: "{{ client_hosts }}"
      loop_control:
        index_var: loop_index

    - name: Append pre-registered users to client definitions
      ansible.builtin.set_fact:
        wireguard_clients_data: "{{ wireguard_clients_data | default([]) + [ {'name': item.client_name, 'ip': (((item.vpn_ip | default('auto')) == 'auto') | ternary((wireguard_server_ip | regex_replace('\\.[0-9]+$', '')) ~ '.' ~ (loop_index + 20) ~ '/32', item.vpn_ip))} ] }}"
      loop: "{{ pre_registered_users | default([]) }}"
      loop_control:
        index_var: loop_index

    - name: Generate private keys for clients
      ansible.builtin.command: wg genkey
      args:
        creates: "/etc/wireguard/clients/{{ item.name }}.key"
      register: generated_client_keys
      changed_when: false
      loop: "{{ wireguard_clients_data | default([]) }}"

    - name: Persist newly generated client keys
      ansible.builtin.copy:
        dest: "/etc/wireguard/clients/{{ item.item.name }}.key"
        content: "{{ item.stdout }}\n"
        mode: "0600"
      when: item.changed | default(false)
      loop: "{{ generated_client_keys.results | default([]) }}"

    - name: Normalize or regenerate invalid client private keys
      ansible.builtin.shell: |
        set -euo pipefail
        key_file="/etc/wireguard/clients/{{ item.name }}.key"
        key_value="$(tr -d '\r\n[:space:]' < "${key_file}" 2>/dev/null || true)"
        if [[ -z "${key_value}" ]] || ! printf '%s' "${key_value}" | wg pubkey >/dev/null 2>&1; then
          wg genkey > "${key_file}"
          chmod 600 "${key_file}"
          echo regenerated
          exit 0
        fi
        printf '%s\n' "${key_value}" > "${key_file}"
        chmod 600 "${key_file}"
        echo normalized
      args:
        executable: /bin/bash
      register: normalized_client_keys
      changed_when: "'regenerated' in normalized_client_keys.stdout"
      loop: "{{ wireguard_clients_data | default([]) }}"

    - name: Derive client public keys
      ansible.builtin.shell: set -euo pipefail; cat /etc/wireguard/clients/{{ item.name }}.key | wg pubkey
      args:
        executable: /bin/bash
      register: client_public_keys
      changed_when: false
      loop: "{{ wireguard_clients_data | default([]) }}"

    - name: Render server WireGuard configuration
      ansible.builtin.copy:
        dest: "/etc/wireguard/{{ wireguard_interface }}.conf"
        mode: "0600"
        content: |
          [Interface]
          Address = {{ wireguard_server_ip }}/24
          ListenPort = {{ wireguard_port }}
          PrivateKey = {{ server_private_key.content | b64decode | trim }}
          SaveConfig = true

          {% for client in client_public_keys.results | default([]) %}
          [Peer]
          PublicKey = {{ client.stdout | trim }}
          AllowedIPs = {{ client.item.ip }}

          {% endfor %}

    - name: Enable and restart WireGuard service
      ansible.builtin.systemd:
        name: "wg-quick@{{ wireguard_interface }}"
        enabled: true
        state: restarted

    - name: Ensure local intranet hostname resolves on server
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^{{ wireguard_server_ip | regex_escape }}\s+{{ service_hostname | regex_escape }}$'
        line: "{{ wireguard_server_ip }} {{ service_hostname }}"
        state: present

    - name: Generate client profile files
      ansible.builtin.shell: |
        set -euo pipefail
        CLIENT_NAME="{{ item.name }}"
        CLIENT_ADDR="{{ item.ip | regex_replace('/32$', '/24') }}"
        CLIENT_KEY="$(cat /etc/wireguard/clients/${CLIENT_NAME}.key)"
        cat > "/opt/netlab/wg-clients/${CLIENT_NAME}.conf" <<EOF
        [Interface]
        PrivateKey = ${CLIENT_KEY}
        Address = ${CLIENT_ADDR}
        DNS = {{ wireguard_dns_ip }}

        [Peer]
        PublicKey = {{ server_public_key.stdout | trim }}
        Endpoint = {{ hostvars[inventory_hostname].ansible_host }}:{{ wireguard_port }}
        AllowedIPs = {{ wireguard_allowed_ips }}
        PersistentKeepalive = 25
        EOF
        chmod 644 "/opt/netlab/wg-clients/${CLIENT_NAME}.conf"
      args:
        executable: /bin/bash
      loop: "{{ wireguard_clients_data | default([]) }}"
      changed_when: true

    - name: Write pre-registered user YAML on server
      ansible.builtin.copy:
        dest: /opt/netlab/auth/users.yml
        mode: "0600"
        content: |
          pre_registered_users:
          {% for user in pre_registered_users | default([]) %}
            - username: {{ user.username }}
              password_hash: {{ user.password_hash }}
              client_name: {{ user.client_name }}
              vpn_ip: {{ (((user.vpn_ip | default('auto')) == 'auto') | ternary((wireguard_server_ip | regex_replace('\\.[0-9]+$', '')) ~ '.' ~ (loop.index0 + 20) ~ '/32', user.vpn_ip)) }}
          {% endfor %}

    - name: Install server-side auth validation helper
      ansible.builtin.copy:
        dest: /opt/netlab/auth/validate_user.sh
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          USERNAME=""
          PASSWORD_HASH=""

          while [[ $# -gt 0 ]]; do
            case "$1" in
              --username)
                USERNAME="$2"
                shift 2
                ;;
              --password-hash)
                PASSWORD_HASH="$2"
                shift 2
                ;;
              *)
                echo "INVALID_ARGS"
                exit 2
                ;;
            esac
          done

          if [[ -z "${USERNAME}" || -z "${PASSWORD_HASH}" ]]; then
            echo "INVALID_ARGS"
            exit 2
          fi

          DB_FILE="/opt/netlab/auth/users.yml"
          if [[ ! -f "${DB_FILE}" ]]; then
            echo "SETUP_REQUIRED"
            exit 3
          fi

          USER_LINE="$(awk -v u="${USERNAME}" '
            /^[[:space:]]*-[[:space:]]+username:[[:space:]]*/ {
              user=$3
              gsub(/["'\''[:space:]]/, "", user)
              hash=""
              client=""
            }
            /^[[:space:]]*password_hash:[[:space:]]*/ {
              hash=$2
              gsub(/["'\''[:space:]]/, "", hash)
            }
            /^[[:space:]]*client_name:[[:space:]]*/ {
              client=$2
              gsub(/["'\''[:space:]]/, "", client)
              if (user == u && hash != "" && client != "") {
                print user ":" hash ":" client
                exit
              }
            }
          ' "${DB_FILE}")"

          if [[ -z "${USER_LINE}" ]]; then
            echo "AUTH_FAILED"
            exit 4
          fi

          STORED_HASH="$(printf '%s' "${USER_LINE}" | awk -F: '{print $2}')"
          CLIENT_NAME="$(printf '%s' "${USER_LINE}" | awk -F: '{print $3}')"

          if [[ "${PASSWORD_HASH}" != "${STORED_HASH}" ]]; then
            echo "AUTH_FAILED"
            exit 4
          fi

          printf '%s\n' "${CLIENT_NAME}"

    - name: Allow sudo group to run auth validator without password
      ansible.builtin.copy:
        dest: /etc/sudoers.d/netlab-auth-validate
        mode: "0440"
        validate: /usr/sbin/visudo -cf %s
        content: |
          %sudo ALL=(root) NOPASSWD: /opt/netlab/auth/validate_user.sh

    - name: Write pre-registered user auth database
      ansible.builtin.copy:
        dest: /opt/netlab/auth/users.csv
        mode: "0644"
        content: |
          # username:password_hash:client_name
          {% for user in pre_registered_users | default([]) %}
          {{ user.username }}:{{ user.password_hash }}:{{ user.client_name }}
          {% endfor %}

- name: Optionally install and apply WireGuard profiles on client hosts
  hosts: wireguard_clients
  become: true
  gather_facts: false
  tasks:
    - name: Install WireGuard packages
      ansible.builtin.apt:
        name:
          - wireguard
          - wireguard-tools
        state: present
        update_cache: true

    - name: Ensure WireGuard directory exists
      ansible.builtin.file:
        path: /etc/wireguard
        state: directory
        mode: "0700"

    - name: Read generated client profile from server
      ansible.builtin.slurp:
        path: "/opt/netlab/wg-clients/{{ inventory_hostname }}.conf"
      delegate_to: "{{ groups['wireguard_server'][0] }}"
      register: slurped_client_profile

    - name: Deploy client profile
      ansible.builtin.copy:
        dest: "/etc/wireguard/{{ wireguard_interface }}.conf"
        content: "{{ slurped_client_profile.content | b64decode }}"
        mode: "0600"

    - name: Enable and restart WireGuard service
      ansible.builtin.systemd:
        name: "wg-quick@{{ wireguard_interface }}"
        enabled: true
        state: restarted
